name: golden_care_app
description: "A unified Flutter multi-platform app for Golden Care."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  firebase_app_check: ^0.3.0+1
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.2.10
  firebase_crashlytics: ^4.1.3
  
  # State management / Routing / UI
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  intl: ^0.20.2
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.1
  google_maps_flutter: ^2.14.2
  razorpay_flutter: ^1.4.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  firebase_remote_config: ^5.5.0
  url_launcher: ^6.2.5
  image_picker: ^1.2.1
  permission_handler: ^11.3.1
  flutter_animate: ^4.5.0
  flutter_markdown: ^0.7.7+1
  pinput: ^4.0.0

  # Cross-platform support
  web: ^1.1.0
  http: ^1.2.0

  # Secure local storage for tokens and session data
  flutter_secure_storage: ^9.2.4

  # Cloud Functions client (for calling server-side functions)
  cloud_functions: ^5.2.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#FFFFFF"
    theme_color: "#6D51DE"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
