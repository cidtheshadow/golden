<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="GoldenCare — Elderly care services">

  <!-- Google Sign-in Client ID -->
  <meta name="google-signin-client_id" content="PLACEHOLDER_CLIENT_ID.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="GoldenCare">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>GoldenCare</title>
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      document.body.innerHTML += '<div style="position: absolute; z-index: 9999; background: red; color: white; padding: 20px; font-size: 20px; font-family: monospace;">' + message + '</div>';
      return false;
    };
    window.addEventListener('unhandledrejection', function(event) {
      document.body.innerHTML += '<div style="position: absolute; z-index: 9999; background: red; color: white; padding: 20px; font-size: 20px; font-family: monospace;">Unhandled Rejection: ' + event.reason + '</div>';
    });
  </script>
  <!-- Google Maps SDK: loaded dynamically by Dart code using ConfigService.mapsApiKey -->
  <!-- Do NOT hardcode the API key in this file -->
  <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js" crossorigin="anonymous"
    defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js" crossorigin="anonymous"
    defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js" crossorigin="anonymous"
    defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js" crossorigin="anonymous"
    defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging-compat.js" crossorigin="anonymous"
    defer></script>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
